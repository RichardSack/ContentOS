<!doctype html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Social Content Search MVP</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
  </style>
</head>
<body class="bg-slate-950 text-white">
  <main class="min-h-screen">
    <section class="mx-auto max-w-6xl px-6 py-10">
      <div class="mb-10 rounded-3xl border border-white/10 bg-white/[0.04] p-8 shadow-2xl">
        <div class="mb-6 inline-flex rounded-full border border-cyan-400/30 bg-cyan-400/10 px-4 py-1 text-sm text-cyan-200">
          TikTok zuerst · AssemblyAI Transkription · Supabase Vector Search · Cron Scheduling
        </div>
        <h1 class="mb-4 text-4xl font-bold tracking-tight md:text-6xl">
          Social Content Search
        </h1>
        <p class="max-w-3xl text-lg text-slate-300">
          Schlanker MVP für temporäre Video-Uploads, geplante Social Posts und semantische Suche über Transkripte, Zusammenfassungen und Keywords.
        </p>
      </div>

      <section class="mx-auto max-w-3xl rounded-3xl border border-white/10 bg-white/[0.04] p-6">
        <h2 class="mb-4 text-2xl font-semibold">Was suchst du?</h2>
        <div class="flex flex-col gap-3 sm:flex-row">
          <input id="searchInput" class="w-full rounded-2xl border border-white/10 bg-slate-900 px-4 py-3 text-white outline-none ring-cyan-400/40 focus:ring" placeholder="z. B. KI Automatisierung, Leadgenerierung, Content Recycling" />
          <button onclick="runSearch()" class="rounded-2xl bg-cyan-400 px-5 py-3 font-semibold text-slate-950 hover:bg-cyan-300">Suchen</button>
        </div>
        <div id="results" class="mt-5 space-y-3"></div>
      </section>

      <section id="adminPanel" class="mx-auto mt-8 hidden max-w-3xl rounded-3xl border border-fuchsia-400/20 bg-fuchsia-400/[0.06] p-6">
        <div class="mb-4 flex items-center justify-between gap-4">
          <h2 class="text-2xl font-semibold">Admin Upload / Import</h2>
          <span class="rounded-full bg-fuchsia-400/10 px-3 py-1 text-xs text-fuchsia-200">Nur Admin</span>
        </div>
        <div class="space-y-3">
          <input class="w-full rounded-2xl border border-white/10 bg-slate-900 px-4 py-3" placeholder="Titel" />
          <textarea class="h-24 w-full rounded-2xl border border-white/10 bg-slate-900 px-4 py-3" placeholder="Caption / Beschreibung"></textarea>
          <input type="file" accept="video/*" class="w-full rounded-2xl border border-white/10 bg-slate-900 px-4 py-3 text-slate-300" />
          <input type="datetime-local" class="w-full rounded-2xl border border-white/10 bg-slate-900 px-4 py-3 text-slate-300" />
          <button onclick="mockUpload()" class="w-full rounded-2xl bg-fuchsia-400 px-5 py-3 font-semibold text-slate-950 hover:bg-fuchsia-300">Video planen</button>
        </div>
        <p id="uploadStatus" class="mt-4 text-sm text-slate-300"></p>
      </section>
    </section>
  </main>

  <script>
    const mockData = [
      { title: 'KI Automatisierung für Kundenservice', summary: 'Wie KI-Agenten Kundenanfragen automatisch beantworten.', platform: 'TikTok', similarity: 0.91 },
      { title: 'Make.com Workflow für Leads', summary: 'Leadgenerierung mit Automationen und CRM-Sync.', platform: 'TikTok', similarity: 0.84 },
      { title: 'Content aus Kurzvideos wiederverwenden', summary: 'Transkripte, Keywords und Plattform-Distribution.', platform: 'TikTok', similarity: 0.79 }
    ];

    function runSearch() {
      const q = document.getElementById('searchInput').value.trim();
      const results = document.getElementById('results');
      if (!q) {
        results.innerHTML = '<p class="text-slate-400">Bitte Suchbegriff eingeben.</p>';
        return;
      }
      results.innerHTML = mockData.map(item => `
        <article class="rounded-2xl border border-white/10 bg-slate-900 p-4">
          <div class="mb-1 flex items-center justify-between gap-4">
            <h3 class="font-semibold">${item.title}</h3>
            <span class="rounded-full bg-cyan-400/10 px-3 py-1 text-xs text-cyan-200">${Math.round(item.similarity * 100)}% Match</span>
          </div>
          <p class="text-sm text-slate-300">${item.summary}</p>
          <p class="mt-2 text-xs text-slate-500">Plattform: ${item.platform}</p>
        </article>
      `).join('');
    }

    function mockUpload() {
      document.getElementById('uploadStatus').textContent = 'MVP-Flow: Upload → Transkription → Embedding → geplanter TikTok Post. Backend wird als nächstes angeschlossen.';
    }
  </script>
</body>
</html>
